<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11 Sky - Random Video Chat</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0f0f1a; color: white; }
        .container { display: flex; height: 100vh; }
        .video-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; background: #000; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 12px 30px; border-radius: 50px; display: flex; gap: 15px; }
        button { padding: 10px 18px; border: none; background: #00ff9d; color: black; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .caption { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; max-width: 70%; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-grid">
            <video id="localVideo" autoplay playsinline muted></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div class="caption" id="caption">Waiting for transcription...</div>

    <div class="controls">
        <button onclick="startChat()">Start Chat</button>
        <button onclick="nextStranger()">Next</button>
        <button onclick="toggleMute()">Mute</button>
        <button onclick="toggleVideo()">Stop Video</button>
        <button onclick="openSettings()">Settings</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
